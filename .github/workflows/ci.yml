name: zkPerf CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - run: nix build
      - run: nix flake check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings

  record:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Record perf stat (self-build)
        run: |
          sudo sysctl -w kernel.perf_event_paranoid=-1
          perf stat -e cycles,instructions,cache-misses \
            -o recordings/self-build.stat.txt -- cargo build --release 2>/dev/null || true
          cat recordings/self-build.stat.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: perf-recordings
          path: recordings/
