name: zkPerf CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p zkperf-witness -p zkperf-macros -p cargo-zkperf
      - run: cargo clippy -p zkperf-witness -p zkperf-macros -p cargo-zkperf -- -D warnings
